name: 🚀 MLOps Industrialization Pipeline - IMDB

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v3
      with:
        lfs: true
        fetch-depth: 0

    - name: 🐍 Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip freeze > installed_versions.txt

    - name: 🧪 Run Model Validation (Pytest)
      id: run_tests
      run: |
        pytest -v tests/test_model.py > full_report.txt
      continue-on-error: true

    - name: 📊 Prepare Executive Summary
      id: report_prep
      run: |
        echo "--- 📋 RÉSUMÉ DES TESTS ---" > summary.txt
        tail -n 5 full_report.txt >> summary.txt
        echo "" >> summary.txt
        echo "--- 🔧 ENVIRONNEMENT ---" >> summary.txt
        grep -E "tensorflow|pandas|scikit-learn|gradio" installed_versions.txt >> summary.txt || echo "No ML libs listed" >> summary.txt
        
        echo "DETAILS<<EOF" >> $GITHUB_OUTPUT
        cat summary.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: 📧 Send Hyper-Detailed Notification
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "📢 [MLOps Report] ${{ github.ref_name }} - Status: ${{ steps.run_tests.outcome }}"
        to: mboupdajoyce@gmail.com, ornellaf50@gmail.com, hamadrassem@gmail.com
        from: GitHub Actions (Industrialization Bot)
        body: |
          Bonjour l'équipe (Joyce, Ornella, Hamad),

          Le pipeline MLOps vient de se terminer sur la branche : ${{ github.ref_name }}.

          --------------------------------------------------
          🚀 RÉSULTAT GLOBAL : ${{ steps.run_tests.outcome == 'success' && '✅ RÉUSSI' || '❌ ÉCHEC' }}
          --------------------------------------------------
          
          👤 Déclenché par : ${{ github.actor }}
          🔗 Commit : https://github.com/${{ github.repository }}/commit/${{ github.sha }}

          ${{ steps.report_prep.outputs.DETAILS }}

    - name: 🛑 Fail if tests failed
      if: steps.run_tests.outcome != 'success'
      run: exit 1

    - name: 🤗 Clean Deploy to Hugging Face Spaces
      if: github.ref == 'refs/heads/main' && success()
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # 1. Préparation du dossier de déploiement (isolation totale)
        mkdir deploy_folder
        cp -r src models requirements.txt app.py deploy_folder/
        cd deploy_folder
        
        # 2. Initialisation d'un Git propre forcé sur la branche 'main'
        git init -b main
        git config user.email "bot@mlops.com"
        git config user.name "MLOps Bot"
        
        # 3. Configuration LFS immédiate pour les fichiers .keras
        git lfs install
        git lfs track "models/*.keras"
        git add .gitattributes
        git add .
        
        # 4. Création du commit de production propre (sans historique pollué)
        git commit -m "Deployment: Clean MLOps production build"
        
        # 5. Push forcé vers Hugging Face (écrase l'historique distant pour résoudre le bug LFS)
        git push -f https://user:$HF_TOKEN@huggingface.co/spaces/Joycemboupda/IMDB_Sentiment_Analysis main