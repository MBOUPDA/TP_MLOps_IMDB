name: 🚀 MLOps Industrialization Pipeline - IMDB

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v3
      with:
        lfs: true
        fetch-depth: 0 # ✅ CORRECTION 1 : Récupère tout l'historique pour éviter l'erreur "shallow update"

    - name: 🐍 Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip freeze > installed_versions.txt

    - name: 🧪 Run Model Validation (Pytest)
      id: run_tests
      run: |
        pytest -v tests/test_model.py > full_report.txt
      continue-on-error: true

    - name: 📊 Prepare Executive Summary
      id: report_prep
      run: |
        echo "--- 📋 RÉSUMÉ DES TESTS ---" > summary.txt
        tail -n 5 full_report.txt >> summary.txt
        echo "" >> summary.txt
        echo "--- 🔧 ENVIRONNEMENT ---" >> summary.txt
        grep -E "tensorflow|pandas|scikit-learn|gradio" installed_versions.txt >> summary.txt
        
        echo "DETAILS<<EOF" >> $GITHUB_OUTPUT
        cat summary.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: 📧 Send Hyper-Detailed Notification
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "📢 [MLOps Report] ${{ github.ref_name }} - Status: ${{ steps.run_tests.outcome }}"
        to: mboupdajoyce@gmail.com, ornellaf50@gmail.com, hamadrassem@gmail.com
        from: GitHub Actions (Industrialization Bot)
        body: |
          Bonjour l'équipe (Joyce, Ornella, Hamad),

          Le pipeline MLOps vient de se terminer sur la branche : ${{ github.ref_name }}.

          --------------------------------------------------
          🚀 RÉSULTAT GLOBAL : ${{ steps.run_tests.outcome == 'success' && '✅ RÉUSSI' || '❌ ÉCHEC' }}
          --------------------------------------------------
          
          👤 Déclenché par : ${{ github.actor }}
          🔗 Commit : https://github.com/${{ github.repository }}/commit/${{ github.sha }}

          ${{ steps.report_prep.outputs.DETAILS }}

    - name: 🛑 Fail if tests failed
      if: steps.run_tests.outcome != 'success'
      run: exit 1

    - name: 🤗 Deploy to Hugging Face Spaces
      if: github.ref == 'refs/heads/main' && success()
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        git config --global user.email "bot@mlops.com"
        git config --global user.name "MLOps Bot"
        # ✅ CORRECTION 2 : Nettoyage du remote pour éviter "remote hf already exists"
        git remote rm hf || true 
        git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/Joycemboupda/IMDB_Sentiment_Analysis
        git push -f hf main